<div style="display:flex;justify-content:center;margin:2rem 0;">
  <div style="position:relative;width:100%;max-width:340px;padding-bottom:min(177.78%,calc(100vw * 1.7778));height:0;overflow:hidden;">
    <iframe
      src="https://www.youtube.com/embed/{{ include.id }}"
      style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;"
      allowfullscreen
      loading="lazy"
      title="YouTube Short">
    </iframe>
  </div>
</div>
