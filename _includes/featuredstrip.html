<!-- begin featured strip card -->
{% assign author = site.authors[post.author] %}
<div class="col-md-4 mb-30px">
    <div class="featured-strip-card h-100">
        <div class="featured-strip-thumb">
            <a href="{{ site.baseurl }}{{ post.url }}">
                {% if site.lazyimages == "enabled" %}
                <img class="featured-strip-img lazyimg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAMAAAACCAQAAAA3fa6RAAAADklEQVR42mNkAANGCAUAACMAA2w/AMgAAAAASUVORK5CYII=" data-src="{% if post.image contains "://" %}{{ post.image }}{% else %}{{ site.baseurl }}/{{ post.image }}{% endif %}">
                {% else %}
                <img class="featured-strip-img" src="{% if post.image contains "://" %}{{ post.image }}{% else %}{{ site.baseurl }}/{{ post.image }}{% endif %}">
                {% endif %}
            </a>
            <span class="featured-strip-badge">&#11088; Featured</span>
        </div>
        <div class="featured-strip-body">
            <h3 class="featured-strip-title">
                <a class="text-dark" href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
            </h3>
            <div class="featured-strip-meta">
                {% if author.avatar %}
                <img class="author-thumb" src="{{ site.baseurl }}/{{ author.avatar }}" alt="{{ author.display_name }}">
                {% endif %}
                <span class="post-date">{{ post.date | date_to_string }}</span>
            </div>
        </div>
    </div>
</div>
<!-- end featured strip card -->
