# Site
name: "Vibe Coding Mastery"
title: "Vibe Coding Mastery"
description: "AI systems, content automation, and tools for creators and marketers."
logo: 'assets/images/logo.png'
favicon: 'assets/images/logo.png'
baseurl: ''
url: 'https://nessalazne.github.io'
include: ["_pages"]
permalink: /:title/

# Authors
authors:
  nessa:
    name: Nessa
    display_name: Nessa
    avatar: 'assets/images/avatar.png'
    email: ''
    web: 'https://nessalazne.github.io'
    twitter: ''
    description: "AI systems builder. Helping creators and marketers automate content with Claude."

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

# Pagination
paginate: 6
paginate_path: /page:num/

# Other
markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Lazy Images ("enabled" or "disabled")
lazyimages: "disabled"

exclude: [changelog.md, LICENSE.txt, README.md, Gemfile, Gemfile.lock]
